name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          python -m pytest -q

  notify:
    name: Notify (success/failure)
    runs-on: ubuntu-latest
    needs: test
    if: always()  # Always run even if tests fail
    steps:

      # 1️⃣ Add a GitHub comment if this is a PR
      - name: Comment on PR (if PR)
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## CI Workflow Notification
            **Workflow:** ${{ github.workflow }}
            **Repository:** ${{ github.repository }}
            **Branch/Ref:** ${{ github.ref }}
            **Commit:** ${{ github.sha }}
            **Result:** ${{ needs.test.result }}
            **Run ID:** ${{ github.run_id }}

      # 2️⃣ Add a GitHub Actions workflow summary for all runs
      - name: Add workflow summary
        if: always()
        run: |
          echo "## CI Workflow Notification" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow:** ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch/Ref:** ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Result:** ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Run ID:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY