name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          python -m pytest -q

  notify:
    name: Notify CI result via SendGrid
    runs-on: ubuntu-latest
    needs: test
    if: always()  # Always run to notify even on test failures
    env:
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      EMAIL_FROM: "vamsi.musunuru@autodesk.com"
      EMAIL_TO: "vamsi.musunuru@autodesk.com"  # Can be multiple, comma-separated

    steps:
      - name: Send CI result email via SendGrid
        run: |
          echo "Installing dependencies..."
          python -m pip install --upgrade pip requests

          echo "Sending CI result email via SendGrid..."

          python3 - <<'EOF'
          import os
          import requests

          SENDGRID_API_KEY = os.environ['SENDGRID_API_KEY']
          EMAIL_FROM = os.environ['EMAIL_FROM']
          EMAIL_TO = os.environ['EMAIL_TO'].split(',')

          # Build email body
          body_text = f"""
          CI Workflow Summary:
          Workflow: {os.environ.get('GITHUB_WORKFLOW')}
          Repository: {os.environ.get('GITHUB_REPOSITORY')}
          Ref: {os.environ.get('GITHUB_REF')}
          Commit: {os.environ.get('GITHUB_SHA')}
          Result: {os.environ.get('JOB_STATUS', 'unknown')}
          Run ID: {os.environ.get('GITHUB_RUN_ID')}
          """

          # Prepare SendGrid payload
          recipients = [{"email": email.strip()} for email in EMAIL_TO]
          payload = {
              "personalizations": [{"to": recipients}],
              "from": {"email": EMAIL_FROM},
              "subject": f"CI {os.environ.get('GITHUB_JOB')} - {os.environ.get('GITHUB_REPOSITORY')}",
              "content": [{"type": "text/plain", "value": body_text}]
          }

          response = requests.post(
              "https://api.sendgrid.com/v3/mail/send",
              headers={
                  "Authorization": f"Bearer {SENDGRID_API_KEY}",
                  "Content-Type": "application/json"
              },
              json=payload
          )

          if response.status_code >= 400:
              print("SendGrid Error:", response.text)
              exit(1)
          else:
              print("SendGrid email sent successfully.")
          EOF