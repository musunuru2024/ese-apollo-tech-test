name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          python -m pytest -q

  notify:
    name: Notify via GitHub (Success/Failure)
    runs-on: ubuntu-latest
    needs: test
    if: always()  # Always run this job
    steps:
      - name: Create GitHub notification comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # If workflow is triggered by PR, comment there. Otherwise use run ID.
          issue-number: ${{ github.event.pull_request.number || github.run_id }}
          body: |
            ## CI Workflow Notification
            **Workflow:** ${{ github.workflow }}
            **Repository:** ${{ github.repository }}
            **Branch/Ref:** ${{ github.ref }}
            **Commit:** ${{ github.sha }}
            **Result:** ${{ needs.test.result }}
            **Run ID:** ${{ github.run_id }}