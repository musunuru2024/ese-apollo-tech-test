name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Use a single, recent supported Python version to ensure a quick, reliable CI run
        python-version: ['3.11']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          python -m pytest -q

  notify:
    name: Notify (conditional send)
    runs-on: ubuntu-latest
    needs: test
    # Always run the job (so it can be used to gate notifications), but only run the
    # send step when the required secrets are present. Using a step-level `if` avoids
    # job-level context restrictions.
    if: always()
    env:
      # Use provided NOTIFY_TO secret when available, otherwise fall back to this default.
      # Replace default_recipient@example.com with your preferred default address.
      TO: "${{ secrets.NOTIFY_TO != '' && secrets.NOTIFY_TO || 'vamsi.musunuru@autodesk.com' }}"
    steps:
      - name: Check SMTP secrets
        id: check-secrets
        run: |
          # Check that the SMTP host and FROM address are provided as secrets
          if [ -n "${{ secrets.SMTP_HOST }}" ] && [ -n "${{ secrets.FROM_EMAIL }}" ]; then
            echo "send=true" >> "$GITHUB_OUTPUT"
          else
            echo "send=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send CI result email
        # Always attempt to send the email (on success or failure). The step is allowed
        # to fail without failing the workflow so missing/invalid SMTP secrets won't
        # block your CI run; however, to actually receive mail you must add SMTP secrets.
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI ${{ needs.test.result }} - ${{ github.repository }} @ ${{ github.ref }}"
          body: |
            Workflow: ${{ github.workflow }}
            Repository: ${{ github.repository }}
            Ref: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Result: ${{ needs.test.result }}
            Run: ${{ github.run_id }}
          to: ${{ env.TO }}
          from: vamsi.musunuru@autodesk.com
